{% extends 'base.html' %}
{% block title %}Add Product — FarmDirect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm rounded-4 p-4">
      <h3 class="fw-bold mb-4"><i class="fas fa-plus-circle text-success me-2"></i>List a New Product</h3>
      <form method="POST" enctype="multipart/form-data">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold">Product Name</label>
            <input type="text" name="name" class="form-control rounded-3" required placeholder="e.g. Fresh Tomatoes">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select rounded-3" required>
              <option value="">Select...</option>
              <option>Vegetables</option>
              <option>Fruits</option>
              <option>Grains</option>
              <option>Pulses</option>
              <option>Honey & Dairy</option>
              <option>Poultry</option>
              <option>Spices & Herbs</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control rounded-3" rows="3" required placeholder="Describe your product..."></textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Price (₹)</label>
            <input type="number" name="price" class="form-control rounded-3" required min="1" step="0.5" placeholder="0.00">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Unit</label>
            <select name="unit" class="form-select rounded-3" required>
              <option>kg</option>
              <option>g</option>
              <option>litre</option>
              <option>dozen</option>
              <option>piece</option>
              <option>bunch</option>
              <option>packet</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Available Quantity</label>
            <input type="number" name="quantity" class="form-control rounded-3" required min="1" step="0.5" placeholder="e.g. 50">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold" aria-required="true">Product Image <span class="text-muted">*</span></label>
            <input type="file" name="image" class="form-control rounded-3" accept="image/*" required>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-success px-5 rounded-pill fw-semibold">
            <i class="fas fa-plus me-2"></i>List Product
          </button>
          <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
