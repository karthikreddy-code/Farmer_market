{% extends 'base.html' %}

{% block title %}Revenue Details{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">
        <i class="fas fa-rupee-sign text-success"></i>
        Revenue Details
    </h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <h4>Total Revenue</h4>
            <h2 class="text-success">
                ₹{{ "%.2f"|format(total_revenue) }}
            </h2>
        </div>
    </div>
</div>
{% endblock %}
