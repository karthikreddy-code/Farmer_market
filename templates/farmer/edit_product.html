{% extends 'base.html' %}
{% block title %}Edit Product — FarmDirect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm rounded-4 p-4">
      <h3 class="fw-bold mb-4"><i class="fas fa-edit text-warning me-2"></i>Edit Product</h3>
      <form method="POST" enctype="multipart/form-data">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold">Product Name</label>
            <input type="text" name="name" class="form-control rounded-3" required value="{{ product.name }}">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select rounded-3" required>
              {% for cat in ['Vegetables','Fruits','Grains','Pulses','Honey & Dairy','Poultry','Spices & Herbs','Other'] %}
              <option {{ 'selected' if product.category == cat }}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control rounded-3" rows="3" required>{{ product.description }}</textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Price (₹)</label>
            <input type="number" name="price" class="form-control rounded-3" required min="1" step="0.5" value="{{ product.price }}">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Unit</label>
            <select name="unit" class="form-select rounded-3" required>
              {% for u in ['kg','g','litre','dozen','piece','bunch','packet'] %}
              <option {{ 'selected' if product.unit == u }}>{{ u }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Available Quantity</label>
            <input type="number" name="quantity" class="form-control rounded-3" required step="0.5" value="{{ product.quantity_available }}">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Replace Image (optional)</label>
            <div class="mb-2">
              {% if product.image_url %}
                <img src="{{ product.image_url }}" alt="current" width="96" height="64" style="object-fit:cover" class="rounded-2 mb-2">
              {% endif %}
            </div>
            <input type="file" name="image" class="form-control rounded-3" accept="image/*">
          </div>
          <div class="col-12">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {{ 'checked' if product.is_active }}>
              <label class="form-check-label fw-semibold" for="isActive">Product is active (visible to customers)</label>
            </div>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-warning px-5 rounded-pill fw-semibold">
            <i class="fas fa-save me-2"></i>Save Changes
          </button>
          <a href="{{ url_for('farmer_dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
