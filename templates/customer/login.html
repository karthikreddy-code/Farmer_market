{% extends 'base.html' %}
{% block title %}Login — FarmDirect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-0 shadow-sm rounded-4 p-4">
      <h3 class="fw-bold mb-4 text-center"><i class="fas fa-sign-in-alt text-success me-2"></i>Welcome Back</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control rounded-3" required placeholder="you@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control rounded-3" required placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-success w-100 rounded-3 fw-semibold">Login</button>
      </form>
      <p class="text-center mt-3 text-muted">New here? <a href="{{ url_for('register') }}" class="text-success fw-semibold">Create account</a></p>
    </div>
  </div>
</div>
{% endblock %}
